<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Lupa Password | TP Consult</title>

    <link rel="stylesheet"
          href="../asset/css/forgot-password.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

</head>

<body>

<div class="container">

    <div class="reset-card">

        <div class="logo">

            <img src="../assets/images/logo.png"
                 alt="TP Consult">

        </div>

        <h2>Lupa Password</h2>

        <p>
            Masukkan NIM atau NIP yang terdaftar
            untuk melakukan reset password.
        </p>

        <!-- STEP 1 -->

        <div id="step1">

            <div class="form-group">

                <label>NIM / NIP</label>

                <input
                    type="text"
                    id="userId"
                    placeholder="Masukkan NIM atau NIP">

            </div>

            <button
                class="btn-primary"
                onclick="sendCode()">

                Kirim Kode Verifikasi

            </button>

        </div>

        <!-- STEP 2 -->

        <div id="step2" style="display:none;">

            <div class="form-group">

                <label>Kode Verifikasi</label>

                <input
                    type="text"
                    id="verificationCode">

            </div>

            <div class="form-group">

                <label>Password Baru</label>

                <input
                    type="password"
                    id="newPassword">

            </div>

            <div class="form-group">

                <label>Konfirmasi Password</label>

                <input
                    type="password"
                    id="confirmPassword">

            </div>

            <button
                class="btn-primary"
                onclick="resetPassword()">

                Reset Password

            </button>

        </div>

        <a
            href="../index.html"
            class="back-link">

            ← Kembali ke Login

        </a>

    </div>

</div>

<script src="../asset/js/forgot-password.js"></script>

</body>
</html>
